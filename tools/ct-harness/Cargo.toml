[package]
name = "rscrypto-ct-harness"
version = "0.0.0"
edition = "2024"
publish = false

[workspace]

[profile.release]
opt-level = 3
debug = false
strip = "debuginfo"
overflow-checks = true
lto = "fat"
panic = "abort"
codegen-units = 1

[lib]
name = "rscrypto_ct_harness"
crate-type = ["staticlib"]
bench = false

[dependencies]
rscrypto = { path = "../..", default-features = false, features = [
  "std",
  "full",
  "parallel",
  "diag",
] }
