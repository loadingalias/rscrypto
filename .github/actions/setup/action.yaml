name: Setup rscrypto Environment
description: |
  Install Rust toolchain, cargo tools, and configure caching.
  Unified host setup for GHA + runs-on.com + IBM/RISC-V runners.

inputs:
  cache-key:
    description: Suffix for the rust-cache key (workflow + target).
    required: false
    default: ""
  tools-mode:
    description: Tool install mode (standard, bench, ibm, fuzz, coverage, minimal, none).
    required: false
    default: "standard"
  toolchain-components:
    description: Comma-separated rust toolchain components.
    required: false
    default: "clippy, rustfmt, rust-src"
  enable-magic-cache:
    description: Enable runs-on.com MagicCache (S3-backed). Only effective on runs-on pools declaring s3-cache extras.
    required: false
    default: "false"
  enable-rust-cache:
    description: Enable Swatinem/rust-cache for cargo artifacts. Bench lanes set to false to force clean builds.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Detect Host Architecture
      id: host
      shell: bash
      run: echo "uname_m=$(uname -m)" >> "$GITHUB_OUTPUT"

    # runs-on.com S3-backed cache intercept. No-op on non-runs-on pools.
    - name: Setup MagicCache
      if: inputs.enable-magic-cache == 'true'
      uses: runs-on/action@742bf56072eb4845a0f94b3394673e4903c90ff0  # v2

    - name: Setup Toolchain
      uses: ./.github/actions/setup-toolchain
      with:
        components: ${{ inputs.toolchain-components }}

    # Cargo tools cache — mode in the key so mode swaps don't contaminate a shared slot.
    - name: Cache Cargo Tools
      if: inputs.tools-mode != 'none'
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684  # v4.2.3
      with:
        path: ~/.cargo/bin
        key: cargo-tools-${{ runner.os }}-${{ steps.host.outputs.uname_m }}-${{ inputs.tools-mode }}-v10

    - name: Install Cargo Tools
      if: inputs.tools-mode != 'none'
      shell: bash
      env:
        CARGO_RAIL_VERSION: "0.11.0"
      run: scripts/ci/install-tools.sh ${{ inputs.tools-mode }}

    - name: Setup Rust Cache
      if: inputs.enable-rust-cache == 'true'
      uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5  # v2.8.2
      with:
        shared-key: "rscrypto-v1"
        key: ${{ inputs.cache-key }}
        cache-on-failure: true
        # Populate cache on main, manual dispatch, and PRs (so slow platforms
        # like IBM/RISC-V warm their cache before merge).
        save-if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' }}
