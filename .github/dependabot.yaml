version: 2
updates:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Rust Dependencies (Cargo)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  # Single Cargo entry is intentional: Dependabot requires non-overlapping
  # directories for entries that target the same ecosystem and branch.
  - package-ecosystem: "cargo"
    directories:
      - "/"
      - "/fuzz"
      - "/fuzz-packages/*"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"

    groups:
      rust-patch-updates:
        patterns: ["*"]
        update-types: ["patch"]
      rust-minor-updates:
        patterns: ["*"]
        update-types: ["minor"]

    # Major updates are intentionally ungrouped for review.

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # GitHub Actions (Security-Critical: SHA-Pinned)
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Dependabot understands SHA-pinned actions when formatted as:
  #   uses: actions/checkout@abc123...  # v4.1.7
  #
  # It will:
  #   1. Monitor the semantic version in the comment
  #   2. Update the SHA when new versions release
  #   3. Preserve the SHA-pinned format for security
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    rebase-strategy: "auto"

    # Group all GitHub Actions updates to reduce PR noise
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]

    # Note: Major version updates are NOT grouped
    # These require manual review due to potential breaking changes
