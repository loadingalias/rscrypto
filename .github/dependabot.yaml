version: 2
updates:
  # One non-overlapping scan covers every Cargo manifest. Keep updates
  # independent: cross-directory `group-by` PRs cannot currently refresh.
  - package-ecosystem: "cargo"
    directories:
      - "/"
      - "/fuzz"
      - "/fuzz-packages/*"
      - "/tools/*"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    # Cargo manifests are coordinated oracles and feature-scoped harnesses.
    # Dependabot cannot refresh cross-directory Cargo PRs reliably, so routine
    # version updates flow through `just update`. Security updates retain
    # GitHub's separate ten-PR limit and remain enabled repository-wide.
    open-pull-requests-limit: 0
    rebase-strategy: "auto"

  # Workflow pins are authoritative. Dependabot updates the immutable SHA and
  # same-line semantic ref; dependency smoke validates both against upstream.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 1
    rebase-strategy: "auto"

    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]

    # Major updates stay separate for explicit review.
