# GitHub Actions Version Lock File
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Single source of truth for all external GitHub Actions used in workflows.
# Managed by scripts/ci/upgrade-actions.sh and scripts/ci/pin-actions.sh.
#
# Usage:
#   1. Add new external actions here first with desired semantic version
#   2. Run: just update (upgrades refs, resolves SHAs, rewrites workflows)
#   3. Run: just pin-actions when only refreshing SHAs for existing refs
#
# Format:
#   <action-name>:
#     ref: <semantic-version>  # What we want (Dependabot monitors this)
#     sha: <commit-sha>         # Immutable pin (generated)
#     updated: <ISO-8601>       # Last verification timestamp
#
# Security Note:
#   Workflows use SHA-pinned format: uses: actions/checkout@abc123...  # v4.1.7
#   Dependabot reads the comment (# v4.1.7) and can open dependency-update PRs.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

