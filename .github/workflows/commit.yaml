name: Commit

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: commit-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

jobs:
  lane-contract:
    name: Lane Contract (commit)
    runs-on: ubuntu-latest
    steps:
      - name: Assert lane
        run: |
          test "${{ github.event_name }}" = "push" -o "${{ github.event_name }}" = "pull_request" -o "${{ github.event_name }}" = "workflow_dispatch"
          echo "lane=commit"

  rail-plan:
    name: Build Plan
    needs: lane-contract
    runs-on: ubuntu-latest
    outputs:
      base_ref: ${{ steps.rail.outputs.base-ref || steps.manual.outputs.base_ref }}
      scope_json: ${{ steps.rail.outputs.scope-json || '' }}
      build: ${{ steps.rail.outputs.build || 'false' }}
      test: ${{ steps.rail.outputs.test || 'false' }}
      infra: ${{ steps.rail.outputs.infra || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Manual dispatch (no change detection)
        if: github.event_name == 'workflow_dispatch'
        id: manual
        run: echo "base_ref=" >> "$GITHUB_OUTPUT"

      - name: Build Plan
        if: github.event_name != 'workflow_dispatch'
        id: rail
        uses: loadingalias/cargo-rail-action@ae6949275b492140e174b0b117286bae3bd9455b  # v4.0.0
        with:
          version: "0.11.0"
          args: "--explain"

  target-matrix:
    name: Resolve Target Matrix
    needs: lane-contract
    runs-on: ubuntu-latest
    outputs:
      commit_ci: ${{ steps.matrix.outputs.commit_ci }}
      commit_no_std: ${{ steps.matrix.outputs.commit_no_std }}
      commit_wasm: ${{ steps.matrix.outputs.commit_wasm }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Load matrix from manifest
        id: matrix
        run: |
          {
            echo "commit_ci=$(bash scripts/lib/target-matrix.sh --format json --key commit_ci)"
            echo "commit_no_std=$(bash scripts/lib/target-matrix.sh --format json --key commit_no_std)"
            echo "commit_wasm=$(bash scripts/lib/target-matrix.sh --format json --key commit_wasm)"
          } >> "$GITHUB_OUTPUT"

  ci:
    name: CI (${{ matrix.target.name }})
    needs: [lane-contract, rail-plan, target-matrix]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.rail-plan.outputs.build == 'true' || needs.rail-plan.outputs.test == 'true' || needs.rail-plan.outputs.infra == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.target-matrix.outputs.commit_ci) }}
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: ${{ matrix.target.runner }}
      timeout_minutes: 35
      setup_kind: default
      cache_key: commit-${{ matrix.target.name }}
      tools_mode: ${{ contains(matrix.target.name, 'windows-msvc') && 'none' || 'standard' }}
      toolchain_components: ${{ contains(matrix.target.name, 'windows-msvc') && '' || 'clippy, rustfmt, rust-src' }}
      run_script: |
        case "${{ matrix.target.name }}" in
          *windows-msvc)
            echo "Windows commit lane: compile-only smoke"
            cargo check --workspace --all-targets --all-features
            cargo test --workspace --all-features --no-run
            ;;
          *)
            if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
              just check --all
              just build
              just test --all
            else
              export RAIL_SINCE="${{ needs.rail-plan.outputs.base_ref }}"
              export RAIL_SCOPE_JSON='${{ needs.rail-plan.outputs.scope_json }}'
              just check
              just build
              just test-changed
            fi
            ;;
        esac

  ci-ibm-s390x:
    name: CI (IBM Z s390x)
    needs: [lane-contract, rail-plan]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.rail-plan.outputs.build == 'true' || needs.rail-plan.outputs.test == 'true' || needs.rail-plan.outputs.infra == 'true' }}
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: ubuntu-24.04-s390x
      timeout_minutes: 90
      setup_kind: default
      cache_key: commit-ci-s390x
      tools_mode: ibm
      toolchain_components: "clippy, rustfmt"
      pre_script: |
        uname -a
        lscpu
        cat /proc/cpuinfo | head -50
      run_script: |
        just ci-check
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          just test --all
        else
          export RAIL_SINCE="${{ needs.rail-plan.outputs.base_ref }}"
          export RAIL_SCOPE_JSON='${{ needs.rail-plan.outputs.scope_json }}'
          just test-changed
        fi

  ci-ibm-power10:
    name: CI (IBM POWER10 ppc64le)
    needs: [lane-contract, rail-plan]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.rail-plan.outputs.build == 'true' || needs.rail-plan.outputs.test == 'true' || needs.rail-plan.outputs.infra == 'true' }}
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: ubuntu-24.04-ppc64le-p10
      timeout_minutes: 90
      setup_kind: default
      cache_key: commit-ci-power10
      tools_mode: ibm
      toolchain_components: "clippy, rustfmt"
      pre_script: |
        uname -a
        lscpu
        cat /proc/cpuinfo | head -50
      run_script: |
        just ci-check
        if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
          just test --all
        else
          export RAIL_SINCE="${{ needs.rail-plan.outputs.base_ref }}"
          export RAIL_SCOPE_JSON='${{ needs.rail-plan.outputs.scope_json }}'
          just test-changed
        fi

  no-std:
    name: no_std (${{ matrix.target }})
    needs: [lane-contract, rail-plan, target-matrix]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.rail-plan.outputs.build == 'true' || needs.rail-plan.outputs.infra == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.target-matrix.outputs.commit_no_std) }}
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: ubuntu-latest
      timeout_minutes: 20
      setup_kind: default
      cache_key: commit-no-std-${{ matrix.target }}
      tools_mode: minimal
      run_script: |
        rustup target add ${{ matrix.target }}
        cargo check --target ${{ matrix.target }} --no-default-features --lib
        cargo check --target ${{ matrix.target }} --no-default-features --features alloc --lib
        cargo build --target ${{ matrix.target }} --no-default-features --lib --release
        cargo build --target ${{ matrix.target }} --no-default-features --features alloc --lib --release
        if [[ "${{ matrix.target }}" == "thumbv6m-none-eabi" ]]; then
          cargo check --target ${{ matrix.target }} --no-default-features --features checksums --lib
        fi

  wasm:
    name: wasm (${{ matrix.target }})
    needs: [lane-contract, rail-plan, target-matrix]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.rail-plan.outputs.build == 'true' || needs.rail-plan.outputs.infra == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.target-matrix.outputs.commit_wasm) }}
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: ubuntu-latest
      timeout_minutes: 20
      setup_kind: default
      cache_key: commit-wasm-${{ matrix.target }}
      tools_mode: minimal
      run_script: |
        rustup target add ${{ matrix.target }}
        cargo check --target ${{ matrix.target }} --no-default-features --lib
        cargo check --target ${{ matrix.target }} --no-default-features --features alloc --lib
        cargo build --target ${{ matrix.target }} --no-default-features --lib --release
        cargo build --target ${{ matrix.target }} --no-default-features --features alloc --lib --release
        if [[ "${{ matrix.target }}" == "wasm32-unknown-unknown" ]]; then
          cargo check --target ${{ matrix.target }} --no-default-features --features hashes --lib
        fi

  complete:
    name: Complete (commit)
    needs: [ci, ci-ibm-s390x, ci-ibm-power10, no-std, wasm]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert required lanes
        run: |
          if [ "${{ needs.ci.result }}" != "success" ] && [ "${{ needs.ci.result }}" != "skipped" ]; then
            exit 1
          fi
          if [ "${{ needs.ci-ibm-s390x.result }}" != "success" ] && [ "${{ needs.ci-ibm-s390x.result }}" != "skipped" ]; then
            exit 1
          fi
          if [ "${{ needs.ci-ibm-power10.result }}" != "success" ] && [ "${{ needs.ci-ibm-power10.result }}" != "skipped" ]; then
            exit 1
          fi
          if [ "${{ needs.no-std.result }}" != "success" ] && [ "${{ needs.no-std.result }}" != "skipped" ]; then
            exit 1
          fi
          if [ "${{ needs.wasm.result }}" != "success" ] && [ "${{ needs.wasm.result }}" != "skipped" ]; then
            exit 1
          fi
