name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

jobs:
  rail-plan:
    name: Build Plan
    if: ${{ github.event_name != 'pull_request' || github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.rail.outputs.build || 'true' }}
      test: ${{ steps.rail.outputs.test || 'true' }}
      infra: ${{ steps.rail.outputs.infra || 'true' }}
      cargo_graph: ${{ steps.graph.outputs.enabled || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Build Plan (PR)
        if: github.event_name == 'pull_request'
        id: rail
        uses: loadingalias/cargo-rail-action@90f7f739028887508c6e8d8b7cc510dc612eb653  # v5.1.0
        with:
          version: "0.17.3"

      - name: Check Release Intent Coverage
        if: github.event_name == 'pull_request'
        env:
          RAIL_BASE_REF: ${{ steps.rail.outputs.base-ref }}
        run: cargo rail change check --since "$RAIL_BASE_REF" --required

      - name: Resolve Cargo Graph Assurance
        id: graph
        env:
          EVENT_NAME: ${{ github.event_name }}
          RAIL_SCOPE_JSON: ${{ steps.rail.outputs.scope-json }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            enabled="$(jq -r '.surfaces["custom:cargo_graph"] // false' <<<"$RAIL_SCOPE_JSON")"
          else
            enabled=true
          fi
          echo "enabled=$enabled" >> "$GITHUB_OUTPUT"

  dependency-smoke:
    name: Dependency Smoke
    if: ${{ github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' }}
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: ubuntu-latest
      timeout_minutes: 20
      cache_key: dependabot-smoke
      tools_mode: supply-chain
      toolchain_components: "clippy, rustfmt"
      enable_magic_cache: false
      enable_rust_cache: true
      run_script: |
        set -euo pipefail
        GITHUB_BASE_SHA="${{ github.event.pull_request.base.sha }}" bash scripts/ci/dependabot-smoke.sh

  suite:
    name: CI Suite
    needs: rail-plan
    if: ${{ github.event_name != 'pull_request' || (github.actor != 'dependabot[bot]' && (needs.rail-plan.outputs.build == 'true' || needs.rail-plan.outputs.test == 'true' || needs.rail-plan.outputs.infra == 'true')) }}
    uses: ./.github/workflows/_ci-suite.yaml
    with:
      cache_key_prefix: commit
      supply_chain_mode: light
      test_mode: commit
      include_riscv: false
      include_cargo_graph: ${{ needs.rail-plan.outputs.cargo_graph == 'true' }}

  complete:
    name: Complete
    needs: [rail-plan, suite, dependency-smoke]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert suite passed
        env:
          ACTOR: ${{ github.actor }}
          DEPENDENCY_SMOKE_RESULT: ${{ needs.dependency-smoke.result }}
          EVENT_NAME: ${{ github.event_name }}
          PLAN_RESULT: ${{ needs.rail-plan.result }}
          SUITE_RESULT: ${{ needs.suite.result }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" && "$ACTOR" == "dependabot[bot]" ]]; then
            if [[ "$DEPENDENCY_SMOKE_RESULT" != "success" ]]; then
              echo "Dependency smoke result: $DEPENDENCY_SMOKE_RESULT"
              exit 1
            fi
            echo "Dependency smoke: $DEPENDENCY_SMOKE_RESULT"
            exit 0
          fi

          if [[ "$PLAN_RESULT" != "success" ]]; then
            echo "Build plan result: $PLAN_RESULT"
            exit 1
          fi

          if [[ "$SUITE_RESULT" != "success" && "$SUITE_RESULT" != "skipped" ]]; then
            echo "CI suite result: $SUITE_RESULT"
            exit 1
          fi
          echo "CI suite: $SUITE_RESULT"
