name: Bench

on:
  workflow_dispatch:
    inputs:
      targets:
        description: "CRATES (Empty = All)"
        required: false
        type: string
      platforms:
        description: "RUNNERS (Empty = All). Options: zen4, spr, icl, zen5, g3, g4, s390x, power10, riscv."
        required: false
        type: string
        default: "all"
      filter:
        description: "FILTERS (Optional)"
        required: false
        type: string
      quick:
        description: "QUICK (Optional)"
        required: false
        type: boolean
        default: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  RSCRYPTO_BENCH_MODE: ci
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      has_targets: ${{ steps.plan.outputs.has_targets }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 1

      - name: Build Lane Matrix
        id: plan
        shell: bash
        env:
          GH_RUN_ID: ${{ github.run_id }}
          BENCH_PLATFORMS: ${{ inputs.platforms }}
        run: scripts/ci/emit-manual-matrix.sh bench

  bench:
    name: Benchmark (${{ matrix.display_name }})
    needs: plan
    if: ${{ needs.plan.outputs.has_targets == 'true' }}
    concurrency:
      # Multiple bench runs can overlap across lanes; serialize per lane.
      group: bench-${{ github.ref }}-${{ matrix.platform }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: ${{ matrix.runner }}
      timeout_minutes: ${{ matrix.timeout_minutes }}
      cache_key: ""
      tools_mode: ${{ matrix.tools_mode }}
      toolchain_components: ${{ matrix.toolchain_components }}
      # Clean builds required for bench integrity — no caching on any bench lane.
      enable_magic_cache: false
      enable_rust_cache: false
      pre_script: |
        echo "Bench host: ${{ matrix.platform }} (${{ matrix.os }})"
        uname -a
        lscpu
        sed -n '1,50p' /proc/cpuinfo
      run_script: |
        RUN_DATE="$(date -u +"%Y-%m-%d")"
        RUN_TIME="$(date -u +"%H_%M_%S")"
        RUN_COMMIT="$(git rev-parse HEAD 2>/dev/null || echo unknown)"
        BENCH_OUTPUT_DIR=benchmark-results \
        BENCH_RESULTS_DIR=benchmark-results \
        BENCH_RUN_DATE="$RUN_DATE" \
        BENCH_RUN_TIME="$RUN_TIME" \
        BENCH_RUN_OS="${{ matrix.os }}" \
        BENCH_RUN_ARCH="${{ matrix.platform }}" \
        BENCH_RUN_COMMIT="$RUN_COMMIT" \
        BENCH_RUN_MODE=ci \
        BENCH_ONLY="${{ inputs.targets }}" \
        BENCH_FILTER="${{ inputs.filter }}" \
        BENCH_QUICK=${{ inputs.quick && 'true' || 'false' }} \
        BENCH_ALLOW_FULL_HASHES_COMP=true \
        BENCH_PLATFORM="${{ matrix.platform }}" \
        scripts/ci/run-bench.sh
      artifact_name: benchmark-${{ matrix.artifact_suffix }}
      artifact_path: benchmark-results/
