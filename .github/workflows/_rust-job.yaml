name: _rust-job

on:
  workflow_call:
    inputs:
      operation:
        required: true
        type: string
      runner:
        required: true
        type: string
      timeout_minutes:
        required: false
        type: number
        default: 30
      cache_key:
        required: false
        type: string
        default: ""
      tools_mode:
        required: false
        type: string
        default: standard
      toolchain_components:
        required: false
        type: string
        default: "clippy, rustfmt, rust-src"
      enable_magic_cache:
        required: false
        type: boolean
        default: false
      enable_rust_cache:
        required: false
        type: boolean
        default: true
      test_mode:
        required: false
        type: string
        default: ""
      target:
        required: false
        type: string
        default: ""
      platform:
        required: false
        type: string
        default: ""
      supply_chain_mode:
        required: false
        type: string
        default: ""
      base_sha:
        required: false
        type: string
        default: ""
      miri_tree_borrows:
        required: false
        type: boolean
        default: false
      bench_targets:
        required: false
        type: string
        default: all
      bench_filter:
        required: false
        type: string
        default: ""
      bench_quick:
        required: false
        type: boolean
        default: false
      dudect_timeout:
        required: false
        type: number
        default: 1800
      dudect_filter:
        required: false
        type: string
        default: ""
      dudect_gate:
        required: false
        type: string
        default: required
      binsec_timeout:
        required: false
        type: number
        default: 900
      upload_raw_artifacts:
        required: false
        type: boolean
        default: false
      artifact_name:
        required: false
        type: string
        default: ""
      artifact_path:
        required: false
        type: string
        default: ""
      artifact_always:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  run:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup
        with:
          cache-key: ${{ inputs.cache_key }}
          tools-mode: ${{ inputs.tools_mode }}
          toolchain-components: ${{ inputs.toolchain_components }}
          enable-magic-cache: ${{ inputs.enable_magic_cache }}
          enable-rust-cache: ${{ inputs.enable_rust_cache }}

      - name: Run
        shell: bash
        env:
          RSCRYPTO_CI_OPERATION: ${{ inputs.operation }}
          RSCRYPTO_CI_RUNNER: ${{ inputs.runner }}
          RSCRYPTO_CI_TEST_MODE: ${{ inputs.test_mode }}
          RSCRYPTO_CI_TARGET: ${{ inputs.target }}
          RSCRYPTO_CI_PLATFORM: ${{ inputs.platform }}
          RSCRYPTO_CI_SUPPLY_CHAIN_MODE: ${{ inputs.supply_chain_mode }}
          RSCRYPTO_CI_BASE_SHA: ${{ inputs.base_sha }}
          RSCRYPTO_CI_MIRI_TREE_BORROWS: ${{ inputs.miri_tree_borrows && 'true' || 'false' }}
          RSCRYPTO_CI_BENCH_TARGETS: ${{ inputs.bench_targets }}
          RSCRYPTO_CI_BENCH_FILTER: ${{ inputs.bench_filter }}
          RSCRYPTO_CI_BENCH_QUICK: ${{ inputs.bench_quick && 'true' || 'false' }}
          RSCRYPTO_CI_DUDECT_TIMEOUT: ${{ inputs.dudect_timeout }}
          RSCRYPTO_CI_DUDECT_FILTER: ${{ inputs.dudect_filter }}
          RSCRYPTO_CI_DUDECT_GATE: ${{ inputs.dudect_gate }}
          RSCRYPTO_CI_BINSEC_TIMEOUT: ${{ inputs.binsec_timeout }}
          RSCRYPTO_CI_UPLOAD_RAW_ARTIFACTS: ${{ inputs.upload_raw_artifacts && 'true' || 'false' }}
        run: scripts/ci/run-rust-job.sh

      - name: Upload Artifact (always)
        if: always() && inputs.artifact_name != '' && inputs.artifact_path != '' && inputs.artifact_always
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}
          retention-days: 90

      - name: Upload Artifact (success)
        if: inputs.artifact_name != '' && inputs.artifact_path != '' && !inputs.artifact_always
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}
          retention-days: 90
