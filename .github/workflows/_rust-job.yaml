name: _rust-job

on:
  workflow_call:
    inputs:
      runner:
        required: true
        type: string
      timeout_minutes:
        required: false
        type: number
        default: 30
      cache_key:
        required: false
        type: string
        default: ""
      tools_mode:
        required: false
        type: string
        default: standard
      toolchain_components:
        required: false
        type: string
        default: "clippy, rustfmt, rust-src"
      enable_magic_cache:
        required: false
        type: boolean
        default: false
      enable_rust_cache:
        required: false
        type: boolean
        default: true
      pre_script:
        required: false
        type: string
        default: ""
      run_script:
        required: true
        type: string
      artifact_name:
        required: false
        type: string
        default: ""
      artifact_path:
        required: false
        type: string
        default: ""
      artifact_always:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  run:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup
        with:
          cache-key: ${{ inputs.cache_key }}
          tools-mode: ${{ inputs.tools_mode }}
          toolchain-components: ${{ inputs.toolchain_components }}
          enable-magic-cache: ${{ inputs.enable_magic_cache }}
          enable-rust-cache: ${{ inputs.enable_rust_cache }}

      - name: Pre Run
        if: inputs.pre_script != ''
        shell: bash
        env:
          PRE_SCRIPT: ${{ inputs.pre_script }}
        run: bash -euo pipefail <<<"$PRE_SCRIPT"

      - name: Run
        shell: bash
        env:
          RUN_SCRIPT: ${{ inputs.run_script }}
        run: bash -euo pipefail <<<"$RUN_SCRIPT"

      - name: Upload Artifact (always)
        if: always() && inputs.artifact_name != '' && inputs.artifact_path != '' && inputs.artifact_always
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}
          retention-days: 90

      - name: Upload Artifact (success)
        if: inputs.artifact_name != '' && inputs.artifact_path != '' && !inputs.artifact_always
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.artifact_path }}
          retention-days: 90
