name: Constant-Time

on:
  schedule:
    - cron: "17 7 * * 0"
  workflow_dispatch:
    inputs:
      platforms:
        description: "RUNNERS (Empty = all physical CT lanes). Options include zen4, spr, icl, zen5, g3, g4, s390x, power10, riscv, windows, windows-arm64, macos-arm64, macos-x64, musl lanes."
        required: false
        type: string
        default: "all"
      dudect_timeout:
        description: "Timeout in seconds for each per-case dudect command."
        required: false
        type: string
        default: "1800"
      binsec_timeout:
        description: "Timeout in seconds for each BINSEC kernel batch on Linux targets."
        required: false
        type: string
        default: "900"

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RSCRYPTO_CT_MODE: ci

permissions:
  contents: read

jobs:
  plan:
    name: Resolve CT Matrix
    runs-on: ubuntu-latest
    outputs:
      has_targets: ${{ steps.plan.outputs.has_targets }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1

      - name: Build CT Matrix
        id: plan
        shell: bash
        env:
          GH_RUN_ID: ${{ github.run_id }}
          CT_PLATFORMS: ${{ inputs.platforms || 'all' }}
        run: scripts/ci/emit-manual-matrix.sh ct

  ct:
    name: CT Full (${{ matrix.display_name }})
    needs: plan
    if: ${{ needs.plan.outputs.has_targets == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: ${{ matrix.runner }}
      timeout_minutes: ${{ matrix.timeout_minutes }}
      cache_key: ct-${{ matrix.artifact_suffix }}
      tools_mode: ${{ matrix.tools_mode }}
      toolchain_components: ${{ matrix.toolchain_components }}
      enable_magic_cache: ${{ matrix.enable_magic_cache }}
      enable_rust_cache: true
      pre_script: |
        set -euo pipefail
        mkdir -p ct-evidence
        {
          echo "CT platform: ${{ matrix.platform }}"
          echo "CT target: ${{ matrix.target }}"
          echo "CT runner: ${{ matrix.runner }}"
          uname -a || true
          rustc -vV
          cargo -V
          case "$(uname -s)" in
            Linux)
              lscpu || true
              sed -n '1,80p' /proc/cpuinfo || true
              ;;
            MINGW*|MSYS*|CYGWIN*)
              systeminfo || true
              ;;
            Darwin)
              sysctl -a machdep.cpu hw.optional 2>/dev/null || true
              ;;
          esac
        } 2>&1 | tee "ct-evidence/host-${{ matrix.artifact_suffix }}.log"
      run_script: |
        set -euo pipefail
        mkdir -p ct-evidence
        status=0
        args=(--target "${{ matrix.target }}" --dudect-timeout "${{ inputs.dudect_timeout || '1800' }}" --binsec-timeout "${{ inputs.binsec_timeout || '900' }}")

        {
          echo "Running: just ct-check ${args[*]}"
          just ct-check "${args[@]}"
        } 2>&1 | tee "ct-evidence/ct-full-${{ matrix.artifact_suffix }}.log" || status=$?

        if [[ -d target/ct ]]; then
          tar -czf "ct-evidence/target-ct-${{ matrix.artifact_suffix }}.tar.gz" target/ct
        fi

        exit "$status"
      artifact_name: ct-${{ matrix.artifact_suffix }}
      artifact_path: ct-evidence/
      artifact_always: true

  complete:
    name: Complete (CT)
    needs: [plan, ct]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert CT lanes passed
        shell: bash
        run: |
          set -euo pipefail
          plan="${{ needs.plan.result }}"
          ct="${{ needs.ct.result }}"
          if [[ "$plan" != "success" ]]; then
            echo "CT matrix plan failed: $plan"
            exit 1
          fi
          if [[ "$ct" != "success" ]]; then
            echo "CT full result: $ct"
            exit 1
          fi
          echo "CT full: $ct"
