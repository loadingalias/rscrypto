name: Constant-Time

on:
  workflow_call:
    inputs:
      platforms:
        description: "RUNNERS (Empty/all = bench-published physical CT lanes)."
        required: false
        type: string
        default: "all"
      dudect_timeout:
        description: "Timeout in seconds for each per-case dudect command."
        required: false
        type: string
        default: "1800"
      dudect_filter:
        description: "Optional comma-separated DudeCT manifest case/name/filter substrings. Empty = all cases."
        required: false
        type: string
        default: ""
      binsec_timeout:
        description: "Timeout in seconds for each BINSEC kernel batch on Linux targets."
        required: false
        type: string
        default: "900"
      upload_raw_artifacts:
        description: "Upload raw CT build/proof artifacts for debugging. Default uploads compact reports only."
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      platforms:
        description: "RUNNERS (Empty/all = bench-published physical CT lanes)."
        required: false
        type: string
        default: "all"
      dudect_timeout:
        description: "Timeout in seconds for each per-case dudect command."
        required: false
        type: string
        default: "1800"
      dudect_filter:
        description: "Optional comma-separated DudeCT manifest case/name/filter substrings. Empty = all cases."
        required: false
        type: string
        default: ""
      binsec_timeout:
        description: "Timeout in seconds for each BINSEC kernel batch on Linux targets."
        required: false
        type: string
        default: "900"
      upload_raw_artifacts:
        description: "Upload raw CT build/proof artifacts for debugging. Default uploads compact reports only."
        required: false
        type: boolean
        default: false

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RSCRYPTO_CT_MODE: ci

permissions:
  contents: read

jobs:
  plan:
    name: Resolve CT Matrix
    runs-on: ubuntu-latest
    outputs:
      has_targets: ${{ steps.plan.outputs.has_targets }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 1

      - name: Build CT Matrix
        id: plan
        shell: bash
        env:
          GH_RUN_ID: ${{ github.run_id }}
          CT_PLATFORMS: ${{ inputs.platforms || 'all' }}
        run: scripts/ci/emit-manual-matrix.sh ct

  ct:
    name: CT Full (${{ matrix.display_name }})
    needs: plan
    if: ${{ needs.plan.outputs.has_targets == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: ${{ matrix.runner }}
      timeout_minutes: ${{ matrix.timeout_minutes }}
      cache_key: ct-${{ matrix.artifact_suffix }}
      tools_mode: ${{ matrix.tools_mode }}
      toolchain_components: ${{ matrix.toolchain_components }}
      enable_magic_cache: ${{ matrix.enable_magic_cache }}
      enable_rust_cache: true
      pre_script: |
        set -euo pipefail
        mkdir -p ct-evidence
        {
          echo "CT platform: ${{ matrix.platform }}"
          echo "CT target: ${{ matrix.target }}"
          echo "CT runner: ${{ matrix.runner }}"
          uname -a || true
          rustc -vV
          cargo -V
          lscpu || true
          sed -n '1,80p' /proc/cpuinfo || true
        } 2>&1 | tee "ct-evidence/host-${{ matrix.artifact_suffix }}.log"
      run_script: |
        set -euo pipefail
        mkdir -p ct-evidence
        status=0
        raw_artifacts="${{ inputs.upload_raw_artifacts && 'true' || 'false' }}"
        dudect_filter="${{ inputs.dudect_filter || '' }}"
        args=(
          --target "${{ matrix.target }}"
          --dudect-timeout "${{ inputs.dudect_timeout || '1800' }}"
          --binsec-timeout "${{ inputs.binsec_timeout || '900' }}"
        )
        if [[ -n "$dudect_filter" ]]; then
          args+=(--dudect-filter "$dudect_filter")
        fi
        package_args=(--target "${{ matrix.target }}" --suffix "${{ matrix.artifact_suffix }}" --out-dir ct-evidence)

        {
          echo "Running: just ct-check ${args[*]}"
          just ct-check "${args[@]}"
        } 2>&1 | tee "ct-evidence/ct-full-${{ matrix.artifact_suffix }}.log" || status=$?

        if [[ "$raw_artifacts" == "true" ]]; then
          package_args+=(--raw)
        fi
        python3 scripts/ct/package_evidence.py "${package_args[@]}"

        exit "$status"
      artifact_name: ct-${{ matrix.artifact_suffix }}
      artifact_path: ct-evidence/
      artifact_always: true

  complete:
    name: Complete (CT)
    needs: [plan, ct]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert CT lanes passed
        shell: bash
        run: |
          set -euo pipefail
          plan="${{ needs.plan.result }}"
          ct="${{ needs.ct.result }}"
          if [[ "$plan" != "success" ]]; then
            echo "CT matrix plan failed: $plan"
            exit 1
          fi
          if [[ "$ct" != "success" ]]; then
            echo "CT full result: $ct"
            exit 1
          fi
          echo "CT full: $ct"
