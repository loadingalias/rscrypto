name: Constant-Time

on:
  workflow_call:
    inputs:
      platforms:
        description: "RUNNERS (Empty/all = non-RISC physical CT lanes; use RISC-V workflow for RISC-V)."
        required: false
        type: string
        default: "all"
      dudect_timeout:
        description: "Timeout in seconds for each per-case dudect command."
        required: false
        type: string
        default: "1800"
      dudect_filter:
        description: "Optional comma-separated DudeCT case/name/filter substrings. Empty = all cases in selected gate."
        required: false
        type: string
        default: ""
      dudect_gate:
        description: "DudeCT gate to run: required, diagnostic, or all. Required is release evidence."
        required: false
        type: string
        default: "required"
      binsec_timeout:
        description: "Timeout in seconds for each BINSEC kernel batch on Linux targets."
        required: false
        type: string
        default: "900"
      upload_raw_artifacts:
        description: "Upload raw CT build/proof artifacts for debugging. Default uploads compact reports only."
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      platforms:
        description: "RUNNERS (Empty/all = non-RISC physical CT lanes; use RISC-V workflow for RISC-V)."
        required: false
        type: string
        default: "all"
      dudect_timeout:
        description: "Timeout in seconds for each per-case dudect command."
        required: false
        type: string
        default: "1800"
      dudect_filter:
        description: "Optional comma-separated DudeCT case/name/filter substrings. Empty = all cases in selected gate."
        required: false
        type: string
        default: ""
      dudect_gate:
        description: "DudeCT gate to run: required, diagnostic, or all. Required is release evidence."
        required: false
        type: choice
        options:
          - required
          - diagnostic
          - all
        default: "required"
      binsec_timeout:
        description: "Timeout in seconds for each BINSEC kernel batch on Linux targets."
        required: false
        type: string
        default: "900"
      upload_raw_artifacts:
        description: "Upload raw CT build/proof artifacts for debugging. Default uploads compact reports only."
        required: false
        type: boolean
        default: false

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RSCRYPTO_CT_MODE: ci

permissions:
  contents: read

jobs:
  plan:
    name: Resolve CT Matrix
    runs-on: ubuntu-latest
    outputs:
      has_targets: ${{ steps.plan.outputs.has_targets }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Build CT Matrix
        id: plan
        shell: bash
        env:
          GH_RUN_ID: ${{ github.run_id }}
          CT_PLATFORMS: ${{ inputs.platforms || 'all' }}
        run: scripts/ci/emit-manual-matrix.sh ct

  ct:
    name: CT Full (${{ matrix.display_name }})
    needs: plan
    if: ${{ needs.plan.outputs.has_targets == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: ${{ matrix.runner }}
      timeout_minutes: ${{ matrix.timeout_minutes }}
      cache_key: ct-${{ matrix.artifact_suffix }}
      tools_mode: ${{ matrix.tools_mode }}
      toolchain_components: ${{ matrix.toolchain_components }}
      enable_magic_cache: ${{ matrix.enable_magic_cache }}
      enable_rust_cache: ${{ matrix.enable_rust_cache }}
      pre_script: |
        set -euo pipefail
        mkdir -p target/ct-evidence-package
        {
          echo "CT platform: ${{ matrix.platform }}"
          echo "CT target: ${{ matrix.target }}"
          echo "CT runner: ${{ matrix.runner }}"
          uname -a || true
          rustc -vV
          cargo -V
          lscpu || true
          sed -n '1,80p' /proc/cpuinfo || true
        } 2>&1 | tee "target/ct-evidence-package/host-${{ matrix.artifact_suffix }}.log"
      run_script: |
        set -euo pipefail
        evidence_dir="target/ct-evidence-package"
        mkdir -p "$evidence_dir"
        status=0
        raw_artifacts="${{ inputs.upload_raw_artifacts && 'true' || 'false' }}"
        raw_dudect_filter="${{ inputs.dudect_filter || '' }}"
        raw_dudect_gate="${{ inputs.dudect_gate || 'required' }}"
        dudect_filter="$(printf '%s' "$raw_dudect_filter" | tr -d '[:space:]')"
        dudect_gate="$(printf '%s' "$raw_dudect_gate" | tr -d '[:space:]')"
        if [[ "$raw_dudect_filter" != "$dudect_filter" ]]; then
          echo "Normalized whitespace in DudeCT filter input."
        fi
        case "$dudect_gate" in
          required|diagnostic|all) ;;
          *)
            echo "Invalid DudeCT gate: $dudect_gate" >&2
            exit 2
            ;;
        esac
        args=(
          --target "${{ matrix.target }}"
          --dudect-timeout "${{ inputs.dudect_timeout || '1800' }}"
          --binsec-timeout "${{ inputs.binsec_timeout || '900' }}"
          --dudect-gate "$dudect_gate"
        )
        if [[ -n "$dudect_filter" ]]; then
          args+=(--dudect-filter "$dudect_filter")
        fi
        package_args=(--target "${{ matrix.target }}" --suffix "${{ matrix.artifact_suffix }}" --out-dir "$evidence_dir")

        {
          echo "Running: scripts/ct/full.py ${args[*]}"
          scripts/ct/full.py "${args[@]}"
        } 2>&1 | tee "$evidence_dir/ct-full-${{ matrix.artifact_suffix }}.log" || status=$?

        if [[ "$raw_artifacts" == "true" ]]; then
          package_args+=(--raw)
        fi
        scripts/ct/python.sh scripts/ct/package_evidence.py "${package_args[@]}"

        exit "$status"
      artifact_name: ct-${{ matrix.artifact_suffix }}
      artifact_path: target/ct-evidence-package/
      artifact_always: true

  complete:
    name: Complete (CT)
    needs: [plan, ct]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert CT lanes passed
        shell: bash
        run: |
          set -euo pipefail
          plan="${{ needs.plan.result }}"
          ct="${{ needs.ct.result }}"
          if [[ "$plan" != "success" ]]; then
            echo "CT matrix plan failed: $plan"
            exit 1
          fi
          if [[ "$ct" != "success" ]]; then
            echo "CT full result: $ct"
            exit 1
          fi
          echo "CT full: $ct"
