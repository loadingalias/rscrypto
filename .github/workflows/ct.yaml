name: Constant-Time

on:
  workflow_call:
    inputs:
      platforms:
        description: "RUNNERS (Empty/all = non-RISC physical CT lanes; use RISC-V workflow for RISC-V)."
        required: false
        type: string
        default: "all"
      dudect_timeout:
        description: "Timeout in seconds for each per-case dudect command."
        required: false
        type: number
        default: 1800
      dudect_filter:
        description: "Optional comma-separated DudeCT case/name/filter substrings. Empty = all cases in selected gate."
        required: false
        type: string
        default: ""
      dudect_gate:
        description: "DudeCT gate to run: required, diagnostic, or all. Required is release evidence."
        required: false
        type: string
        default: "required"
      binsec_timeout:
        description: "Timeout in seconds for each BINSEC kernel batch on Linux targets."
        required: false
        type: number
        default: 900
      upload_raw_artifacts:
        description: "Upload raw CT build/proof artifacts for debugging. Default uploads compact reports only."
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      platforms:
        description: "RUNNERS (Empty/all = non-RISC physical CT lanes; use RISC-V workflow for RISC-V)."
        required: false
        type: string
        default: "all"
      dudect_timeout:
        description: "Timeout in seconds for each per-case dudect command."
        required: false
        type: number
        default: 1800
      dudect_filter:
        description: "Optional comma-separated DudeCT case/name/filter substrings. Empty = all cases in selected gate."
        required: false
        type: string
        default: ""
      dudect_gate:
        description: "DudeCT gate to run: required, diagnostic, or all. Required is release evidence."
        required: false
        type: choice
        options:
          - required
          - diagnostic
          - all
        default: "required"
      binsec_timeout:
        description: "Timeout in seconds for each BINSEC kernel batch on Linux targets."
        required: false
        type: number
        default: 900
      upload_raw_artifacts:
        description: "Upload raw CT build/proof artifacts for debugging. Default uploads compact reports only."
        required: false
        type: boolean
        default: false

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RSCRYPTO_CT_MODE: ci

permissions:
  contents: read

jobs:
  plan:
    name: Resolve CT Matrix
    runs-on: ubuntu-latest
    outputs:
      has_targets: ${{ steps.plan.outputs.has_targets }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Build CT Matrix
        id: plan
        shell: bash
        env:
          GH_RUN_ID: ${{ github.run_id }}
          CT_PLATFORMS: ${{ inputs.platforms || 'all' }}
        run: scripts/ci/emit-manual-matrix.sh ct

  ct:
    name: CT Full (${{ matrix.display_name }})
    needs: plan
    if: ${{ needs.plan.outputs.has_targets == 'true' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.matrix) }}
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: ${{ matrix.runner }}
      timeout_minutes: ${{ matrix.timeout_minutes }}
      cache_key: ct-${{ matrix.artifact_suffix }}
      tools_mode: ${{ matrix.tools_mode }}
      toolchain_components: ${{ matrix.toolchain_components }}
      enable_magic_cache: ${{ matrix.enable_magic_cache }}
      enable_rust_cache: ${{ matrix.enable_rust_cache }}
      operation: constant-time
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      dudect_timeout: ${{ inputs.dudect_timeout }}
      dudect_filter: ${{ inputs.dudect_filter }}
      dudect_gate: ${{ inputs.dudect_gate }}
      binsec_timeout: ${{ inputs.binsec_timeout }}
      upload_raw_artifacts: ${{ inputs.upload_raw_artifacts }}
      artifact_name: ct-${{ matrix.artifact_suffix }}
      artifact_path: target/ct-evidence-package/
      artifact_always: true

  complete:
    name: Complete (CT)
    needs: [plan, ct]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Assert CT lanes passed
        shell: bash
        run: |
          set -euo pipefail
          plan="${{ needs.plan.result }}"
          ct="${{ needs.ct.result }}"
          if [[ "$plan" != "success" ]]; then
            echo "CT matrix plan failed: $plan"
            exit 1
          fi
          if [[ "$ct" != "success" ]]; then
            echo "CT full result: $ct"
            exit 1
          fi
          echo "CT full: $ct"
