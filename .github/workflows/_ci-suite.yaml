name: _ci-suite

# Reusable CI suite: quality, Cargo graph assurance, feature contracts, native
# targets, cross targets, and supply-chain validation.
# Called by ci.yaml (per PR/push) and weekly.yaml (scheduled full run).

on:
  workflow_call:
    inputs:
      cache_key_prefix:
        description: "Cache-key prefix, segregates commit/weekly caches."
        required: true
        type: string
      supply_chain_mode:
        description: "'light' (cargo deny check advisories) or 'full' (deny all + audit)."
        required: true
        type: string
      test_mode:
        description: "Test mode passed to rscrypto test scripts."
        required: false
        type: string
        default: local
      include_cargo_graph:
        description: "Run exhaustive compiler-backed cargo-rail unification assurance."
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  target-matrix:
    name: Resolve Target Matrix
    runs-on: ubuntu-latest
    outputs:
      ci: ${{ steps.matrix.outputs.ci }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Load matrix
        id: matrix
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          {
            echo "ci=$(bash scripts/lib/target-matrix.sh --format json --key ci)"
          } >> "$GITHUB_OUTPUT"

  quality:
    name: Quality
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: runs-on=${{ github.run_id }}/runner=linux-x64-ci
      timeout_minutes: 30
      cache_key: ${{ inputs.cache_key_prefix }}-quality
      tools_mode: quality
      toolchain_components: "clippy, rustfmt, rust-src"
      enable_magic_cache: true
      enable_rust_cache: true
      operation: quality

  cargo-graph:
    if: ${{ inputs.include_cargo_graph }}
    name: Cargo Graph Assurance
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: runs-on=${{ github.run_id }}/runner=linux-x64-ci
      timeout_minutes: 90
      cache_key: ${{ inputs.cache_key_prefix }}-cargo-graph
      tools_mode: rail
      toolchain_components: "rust-src"
      enable_magic_cache: true
      enable_rust_cache: true
      operation: cargo-graph
      artifact_name: cargo-graph-${{ inputs.cache_key_prefix }}
      artifact_path: target/cargo-rail/unify-result.json
      artifact_always: true

  feature-contracts:
    name: Feature Contracts
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: runs-on=${{ github.run_id }}/runner=linux-x64-ci
      timeout_minutes: 90
      cache_key: ${{ inputs.cache_key_prefix }}-feature-contracts
      tools_mode: minimal
      toolchain_components: "rust-src"
      enable_magic_cache: true
      enable_rust_cache: true
      operation: feature-contracts

  ci:
    name: CI (${{ matrix.target.name }})
    needs: target-matrix
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.target-matrix.outputs.ci) }}
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: ${{ matrix.target.runner }}
      timeout_minutes: 180
      cache_key: ${{ inputs.cache_key_prefix }}-${{ matrix.target.name }}
      tools_mode: ${{ contains(matrix.target.name, 'windows-msvc') && 'none' || 'ci' }}
      toolchain_components: ${{ contains(matrix.target.name, 'windows-msvc') && 'clippy' || 'clippy, rustfmt, rust-src' }}
      enable_magic_cache: ${{ matrix.target.type == 'runson' }}
      enable_rust_cache: true
      operation: native
      target: ${{ matrix.target.name }}
      test_mode: ${{ inputs.test_mode }}

  ci-ibm-s390x:
    name: CI (IBM Z s390x)
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: ubuntu-24.04-s390x
      timeout_minutes: 120
      cache_key: ${{ inputs.cache_key_prefix }}-ibm-s390x
      tools_mode: none
      toolchain_components: "clippy, rustfmt"
      enable_magic_cache: false
      enable_rust_cache: true
      operation: native-ibm
      test_mode: ${{ inputs.test_mode }}

  ci-ibm-power10:
    name: CI (IBM POWER10 ppc64le)
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: ubuntu-24.04-ppc64le-p10
      timeout_minutes: 120
      cache_key: ${{ inputs.cache_key_prefix }}-ibm-power10
      tools_mode: none
      toolchain_components: "clippy, rustfmt"
      enable_magic_cache: false
      enable_rust_cache: true
      operation: native-ibm
      test_mode: ${{ inputs.test_mode }}

  cross-targets:
    name: Cross Targets
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: runs-on=${{ github.run_id }}/runner=linux-x64-ci
      timeout_minutes: 90
      cache_key: ${{ inputs.cache_key_prefix }}-cross-targets
      tools_mode: none
      toolchain_components: "clippy, rust-src"
      enable_magic_cache: true
      enable_rust_cache: true
      operation: cross-targets

  supply-chain:
    name: Supply Chain (${{ inputs.supply_chain_mode }})
    uses: ./.github/workflows/_rust-job.yaml
    with:
      runner: runs-on=${{ github.run_id }}/runner=linux-x64-ci
      timeout_minutes: 15
      cache_key: ${{ inputs.cache_key_prefix }}-supply-chain
      tools_mode: supply-chain
      enable_magic_cache: true
      enable_rust_cache: true
      operation: supply-chain
      supply_chain_mode: ${{ inputs.supply_chain_mode }}
