[package]
name = "rscrypto-fuzz-hash-ascon"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
rscrypto = { path = "../..", features = ["std", "ascon-hash"] }
rscrypto_fuzz = { package = "rscrypto-fuzz-support", path = "../../fuzz/support" }
ascon-hash = "0.4"
digest = "0.11"

[workspace]
members = ["."]

[[bin]]
name = "hash_ascon"
path = "fuzz_targets/hash_ascon.rs"
doc = false

[[bin]]
name = "hash_ascon_cxof"
path = "fuzz_targets/hash_ascon_cxof.rs"
doc = false
