[package]
name = "rscrypto-fuzz-surface-hex-parse"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
rscrypto = { path = "../..", features = ["std", "aes-gcm", "ed25519", "x25519"] }
rscrypto_fuzz = { package = "rscrypto-fuzz-support", path = "../../fuzz/support" }

[workspace]
members = ["."]

[[bin]]
name = "hex_parse"
path = "fuzz_targets/hex_parse.rs"
doc = false
