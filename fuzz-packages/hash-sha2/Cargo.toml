[package]
name = "rscrypto-fuzz-hash-sha2"
version = "0.0.0"
publish = false
edition = "2024"

[package.metadata]
cargo-fuzz = true

[dependencies]
libfuzzer-sys = "0.4"
rscrypto = { path = "../..", features = ["std", "sha2"] }
rscrypto_fuzz = { package = "rscrypto-fuzz-support", path = "../../fuzz/support" }
digest = "0.11"
sha2 = "0.11"

[workspace]
members = ["."]

[[bin]]
name = "hash_sha2"
path = "fuzz_targets/hash_sha2.rs"
doc = false
