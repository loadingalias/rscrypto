gate = "diagnostic"
notes = "Diagnostic only: full RSA private-key import validation performs value-dependent big-integer consistency checks over unrelated keys. Required CT evidence is scoped to bounded same-width validation leaves and steady-state private operations."

[[dudect_case]]
