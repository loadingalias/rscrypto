[[primitive]]
id = "signature.ecdsa_p256_sign"
tier = "A"
claim = "ct-intended"
features = ["ecdsa-p256"]
entrypoints = [
  "EcdsaP256SecretKey::try_sign_blinded",
  "EcdsaP256Keypair::try_sign_blinded",
]
secrets = ["secret_key", "nonce_material", "nonce_scalar", "private_scalar", "coordinate_blinding"]
public = ["message", "message_length", "signature"]
may_leak = ["message_length", "signature"]
must_not_leak_ref = "common_secret_data"
required = ["tier_a"]
notes = "Release CT evidence covers the blinded signing APIs. Deterministic signing uses fixed-work HMAC-derived wide nonce reduction instead of RFC6979's secret-dependent rejection loop, while P-256 portable blinded signing adds a random multiple of the group order and blinds the projective accumulator before fixed-base multiplication, reblinds before affine conversion, and masks the private-scalar product. On s390x and RISC-V, secret-fed limb products use multiplication-free fixed-work arithmetic and remain subject to the native weekly timing gate."
[primitive.harness]
status = "covered"
symbols = ["ct_entry_ecdsa_p256_sign"]

