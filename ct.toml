[[primitive]]
id = "ct.constant_time_eq"
tier = "A"
claim = "ct-intended"
features = ["always"]
entrypoints = ["rscrypto::traits::ct::constant_time_eq", "rscrypto::ConstantTimeEq::ct_eq"]
secrets = ["left_bytes", "right_bytes"]
public = ["left_len", "right_len"]
may_leak = ["input_length", "length_mismatch"]
must_not_leak_ref = "common_secret_data"
required = ["tier_a"]
notes = "Length mismatch is public shape. Equal-length byte contents must not influence timing."
[primitive.harness]
status = "covered"
symbols = ["ct_entry_constant_time_eq"]

[[primitive]]
id = "secret_wrappers.equality_and_display"
tier = "A"
claim = "ct-intended"
features = ["always"]
entrypoints = ["rscrypto::SecretBytes::eq", "secret-key newtype Eq impls", "shared-secret newtype Eq impls", "secret-key Debug impls"]
secrets = ["secret_bytes"]
public = ["type", "length"]
may_leak = ["type", "input_length"]
must_not_leak_ref = "common_secret_data"
required = ["tier_a"]
notes = "Secret Debug must remain masked. Explicit display_secret APIs are caller opt-in and outside opaque logging claims."
[primitive.harness]
status = "covered"
symbols = [
  "ct_entry_secret_bytes32_eq",
  "ct_entry_x25519_secret_eq",
  "ct_entry_ed25519_secret_eq",
  "ct_entry_secret_bytes32_debug_masked",
]

