[manifest]
schema_version = 1
policy = "docs/constant-time.md"
owner = "rscrypto"
backend_scope = ["llvm"]
default_claim = "not-claimed"
release_report = "ct-report.json"
harness = "tools/ct-harness"
artifact_script = "scripts/ct/artifacts.sh"

[status]
ct_claimed = "all required evidence has passed for the exact primitive/configuration pair"
ct_intended = "implementation is intended to satisfy the policy, but release evidence is incomplete"
best_effort = "implementation may reduce leakage, but no release constant-time claim is made"
unsupported = "no constant-time claim and no planned evidence for this release"

[leakage.common_secret_data]
may_leak = ["public_length", "public_algorithm", "public_shape_error", "opaque_success_or_failure"]
must_not_leak = [
  "secret_branch",
  "secret_address",
  "secret_table_index",
  "secret_divisor",
  "secret_loop_bound",
  "secret_error_path",
  "secret_panic_path",
  "secret_allocation",
  "secret_formatting",
  "secret_dispatch",
  "secret_variable_latency_instruction",
]

[evidence.profile.tier_a]
required = ["harness", "provenance", "llvm_ir", "asm", "object_disasm", "asm_heuristics", "dudect"]
required_where_practical = ["binsec"]
auxiliary = ["taint", "miri"]

[evidence.profile.tier_b]
required = ["harness", "provenance", "llvm_ir", "asm", "object_disasm", "asm_heuristics", "dudect"]
required_where_practical = ["binsec"]
auxiliary = ["taint", "miri"]

[evidence.profile.tier_c]
required = ["classification", "opaque_failure_review"]
required_where_practical = ["asm"]

[[harness]]
name = "ct-harness"
path = "tools/ct-harness"
kind = "staticlib"
status = "covered"
symbols = [
  "ct_entry_constant_time_eq",
  "ct_entry_secret_bytes32_eq",
  "ct_entry_x25519_secret_eq",
  "ct_entry_ed25519_secret_eq",
  "ct_entry_secret_bytes32_debug_masked",
  "ct_entry_hmac_sha256_verify",
  "ct_entry_hmac_sha384_verify",
  "ct_entry_hmac_sha512_verify",
  "ct_entry_kmac256_verify",
  "ct_entry_blake3_verify_keyed",
  "ct_entry_chacha20poly1305_open",
  "ct_entry_aes128gcm_open",
  "ct_entry_aes256gcm_open",
  "ct_entry_aes128gcmsiv_open",
  "ct_entry_aes256gcmsiv_open",
  "ct_entry_xchacha20poly1305_open",
  "ct_entry_aegis256_open",
  "ct_entry_ascon_aead128_open",
  "ct_entry_x25519",
  "ct_entry_ed25519_sign",
  "ct_entry_ed25519_verify",
  "ct_entry_rsa_pkcs1v15_sign_fixed_blinding",
  "ct_entry_rsa_oaep_decrypt_fixed_blinding",
  "ct_entry_rsa_private_key_pkcs8_roundtrip",
  "ct_entry_hkdf_sha256_derive",
  "ct_entry_hkdf_sha384_derive",
  "ct_entry_pbkdf2_sha256_derive",
  "ct_entry_pbkdf2_sha256_verify",
  "ct_entry_pbkdf2_sha256_verify_full",
  "ct_entry_pbkdf2_sha512_derive",
  "ct_entry_pbkdf2_sha512_verify",
  "ct_entry_argon2i_hash",
  "ct_entry_argon2i_verify",
  "ct_entry_argon2d_hash",
  "ct_entry_argon2d_verify",
  "ct_entry_argon2id_hash",
  "ct_entry_argon2id_verify",
  "ct_entry_scrypt_verify",
  "ct_entry_blake2b256_keyed_digest",
  "ct_entry_blake2b512_keyed_digest",
  "ct_entry_blake2s128_keyed_digest",
  "ct_entry_blake2s256_keyed_digest",
  "ct_entry_blake3_keyed_digest",
  "ct_entry_public_sha256_digest",
  "ct_entry_public_crc32_checksum",
  "ct_entry_classification_public_only",
  "ct_entry_classification_best_effort",
]
covers = [
  "ct.constant_time_eq",
  "secret_wrappers.equality_and_display",
  "mac.hmac_verify",
  "mac.kmac256_verify",
  "keyed_hash.blake3_verify",
  "aead.open_authentication",
  "kx.x25519",
  "signature.ed25519_sign",
  "signature.ed25519_verify_failure_shape",
  "rsa.private_ops",
  "rsa.private_key_material",
  "kdf.hkdf",
  "kdf.pbkdf2",
  "password.argon2i",
  "password.argon2d_argon2id",
  "password.scrypt",
  "aead.symmetric_transform",
  "keyed_hash.blake2_blake3",
  "public_hashes_and_checksums",
]
notes = "Harness coverage is complete for Step 3/4/5. This does not make release CT claims; ct-claimed still requires the evidence gates in the required profiles."

[[dudect_case]]
name = "constant_time_eq_equal_vs_first_diff"
