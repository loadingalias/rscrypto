api = ["rscrypto::TrySigner::try_sign", "rscrypto::TrySignerInto::{try_sign_into,try_sign_to_vec}", "rscrypto::Verifier::verify", "rscrypto::Kem::{generate_keypair,encapsulate,decapsulate}"]
features = ["always", "alloc for try_sign_to_vec"]
targets = ["all-supported"]
secret_inputs = ["implementation-defined signing key, decapsulation key, randomness, and derived secret"]
public_inputs = ["implementation-defined message, signature, public key, and ciphertext"]
variable_time_components = ["entirely implementation-defined except for each built-in implementation's separately inventoried path"]
permitted_leakage = ["implementation-defined", "opaque verification failure where the contract requires it"]
claim = "unsupported"
limitation = "These public traits are downstream implementation boundaries. Built-in rscrypto implementations map to their algorithm operation rows; the traits cannot enforce timing, zeroization, or error-opacity properties on external implementations."

[[operation]]
id = "diagnostic.security_entrypoints"
api = ["rscrypto::diag_*", "rscrypto::{aead,auth,hashes,secret}::*::diag_*"]
features = ["diag"]
targets = ["host or explicitly cfg-gated diagnostic target"]
secret_inputs = ["operation-specific diagnostic key, password, scalar, state, or intermediate"]
public_inputs = ["operation-specific fixed diagnostic shape and backend selector"]
variable_time_components = ["operation-specific; each linked primitive/harness owns classification"]
permitted_leakage = ["diagnostic digest/result intentionally returned to the caller", "feature and target"]
claim = "unsupported"
limitation = "The diag feature is an evidence/test surface, not a production secrecy boundary. Diagnostic return values deliberately declassify intermediates for harnesses and must not be enabled as an application security API."

